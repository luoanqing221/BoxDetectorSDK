name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download OpenCV
      run: |
        Write-Host "Downloading OpenCV..."
        Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-windows.exe" -OutFile "opencv.exe" -UseBasicParsing
        Write-Host "Installing OpenCV..."
        Start-Process -FilePath "opencv.exe" -ArgumentList "-oC:\opencv -y" -Wait
        Write-Host "OpenCV installed, listing files..."
        Get-ChildItem -Path "C:\opencv" -Recurse | Select-Object FullName

    - name: Download ONNX Runtime
      run: |
        Write-Host "Downloading ONNX Runtime..."
        Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip" -OutFile "onnxruntime.zip" -UseBasicParsing
        Write-Host "Extracting ONNX Runtime..."
        Expand-Archive -Path "onnxruntime.zip" -DestinationPath "C:\" -Force
        Write-Host "ONNX Runtime extracted, listing files..."
        Get-ChildItem -Path "C:\onnxruntime-win-x64-1.17.0" -Recurse | Select-Object FullName

    - name: Find OpenCV Config
      run: |
        Write-Host "Looking for OpenCVConfig.cmake..."
        Get-ChildItem -Path "C:\opencv" -Recurse -Filter "OpenCVConfig.cmake" | Select-Object FullName

    - name: Find ONNX Runtime Config
      run: |
        Write-Host "Looking for ONNX Runtime cmake files..."
        Get-ChildItem -Path "C:\onnxruntime-win-x64-1.17.0" -Recurse -Filter "*.cmake" | Select-Object FullName

    - name: Configure CMake
      run: |
        Write-Host "Creating build directory..."
        mkdir -p build
        cd build
        Write-Host "Running CMake..."
        cmake -G "Visual Studio 17 2022" -A x64 .. `
          -DOpenCV_DIR="C:\opencv\build\x64\vc16\lib" `
          -DONNXRuntime_DIR="C:\onnxruntime-win-x64-1.17.0\lib\cmake\onnxruntime" `
          -DCMAKE_VERBOSE_MAKEFILE=ON
      continue-on-error: false

    - name: Build
      run: |
        cd build
        Write-Host "Building..."
        cmake --build . --config Release --verbose

    - name: Prepare Distribution
      run: |
        mkdir -p dist/bin
        mkdir -p dist/lib
        mkdir -p dist/include
        
        Copy-Item "build\Release\BoxDetectorSDK.dll" dist/bin/ -ErrorAction SilentlyContinue
        Copy-Item "build\Release\BoxDetectorSDK.lib" dist/lib/ -ErrorAction SilentlyContinue
        Copy-Item "BoxDetectorSDK.h" dist/include/
        Copy-Item "C:\opencv\build\x64\vc16\bin\opencv_world490.dll" dist/bin/ -ErrorAction SilentlyContinue
        Copy-Item "C:\onnxruntime-win-x64-1.17.0\lib\onnxruntime.dll" dist/bin/ -ErrorAction SilentlyContinue
        Copy-Item "BoxDetectorSDK.cs" dist/
        Copy-Item "README.md" dist/

    - name: List Build Output
      run: |
        Write-Host "Build directory contents:"
        Get-ChildItem -Path "build" -Recurse | Select-Object FullName, Length
        Write-Host "Dist directory contents:"
        Get-ChildItem -Path "dist" -Recurse | Select-Object FullName, Length

    - name: Create Archive
      run: |
        cd dist
        Compress-Archive -Path * -DestinationPath ../BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}