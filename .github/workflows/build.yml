name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install OpenCV using Chocolatey
      run: choco install opencv -y

    - name: Install ONNX Runtime using Chocolatey
      run: choco install onnxruntime -y

    - name: Find OpenCV path
      run: |
        Write-Host "Finding OpenCV..."
        Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\opencv" -Recurse -Filter "OpenCVConfig.cmake" | Select-Object FullName

    - name: Find ONNX Runtime path
      run: |
        Write-Host "Finding ONNX Runtime..."
        Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\onnxruntime" -Recurse -Filter "onnxruntimeConfig.cmake" | Select-Object FullName

    - name: Configure CMake
      shell: cmd
      run: |
        set OPENCV_DIR=C:\ProgramData\chocolatey\lib\opencv\tools\opencv\build\x64\vc16\lib
        set ONNXRUNTIME_DIR=C:\ProgramData\chocolatey\lib\onnxruntime\tools\onnxruntime\lib\cmake\onnxruntime
        mkdir build && cd build
        cmake -G "Visual Studio 17 2022" -A x64 -DOpenCV_DIR=%OPENCV_DIR% -DONNXRuntime_DIR=%ONNXRUNTIME_DIR% ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Copy dependencies
      run: |
        Copy-Item "C:\ProgramData\chocolatey\lib\opencv\tools\opencv\build\x64\vc16\bin\opencv_world490.dll" dist\bin\
        Copy-Item "C:\ProgramData\chocolatey\lib\onnxruntime\tools\onnxruntime\lib\onnxruntime.dll" dist\bin\

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}