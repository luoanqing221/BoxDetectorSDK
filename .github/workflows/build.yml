name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      id: cache-deps
      with:
        path: |
          C:\opencv
          C:\onnxruntime
        key: dependencies-${{ runner.os }}-opencv490-onnx1170
        restore-keys: |
          dependencies-${{ runner.os }}-

    - name: Download OpenCV prebuilt
      run: |
        $targetPath = "C:\opencv\build\x64\vc16\bin\opencv_world490.dll"
        if (-not (Test-Path -Path $targetPath)) {
          Write-Host "Downloading OpenCV..."
          $url = "https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-windows.exe"
          $output = "C:\temp\opencv.exe"
          New-Item -ItemType Directory -Path "C:\temp" -Force | Out-Null
          
          $attempts = 3
          for ($i = 1; $i -le $attempts; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing -ErrorAction Stop
              Write-Host "Download successful on attempt $i"
              break
            } catch {
              Write-Host "Download attempt $i failed: $_"
              if ($i -eq $attempts) {
                throw "Failed to download OpenCV after $attempts attempts"
              }
              Start-Sleep -Seconds 5
            }
          }
          
          Write-Host "Installing OpenCV..."
          Start-Process -FilePath $output -ArgumentList "-oC:\opencv -y" -Wait -NoNewWindow
          Remove-Item -Path $output -Force
        } else {
          Write-Host "OpenCV already cached, skipping download"
        }

    - name: Download ONNX Runtime prebuilt
      run: |
        $targetPath = "C:\onnxruntime\lib\onnxruntime.dll"
        if (-not (Test-Path -Path $targetPath)) {
          Write-Host "Downloading ONNX Runtime..."
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip"
          $output = "C:\temp\onnxruntime.zip"
          New-Item -ItemType Directory -Path "C:\temp" -Force | Out-Null
          
          $attempts = 3
          for ($i = 1; $i -le $attempts; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing -ErrorAction Stop
              Write-Host "Download successful on attempt $i"
              break
            } catch {
              Write-Host "Download attempt $i failed: $_"
              if ($i -eq $attempts) {
                throw "Failed to download ONNX Runtime after $attempts attempts"
              }
              Start-Sleep -Seconds 5
            }
          }
          
          Write-Host "Extracting ONNX Runtime..."
          Expand-Archive -Path $output -DestinationPath "C:\" -Force
          if (Test-Path "C:\onnxruntime-win-x64-1.17.0") {
            Remove-Item -Path "C:\onnxruntime" -Recurse -Force -ErrorAction SilentlyContinue
            Rename-Item -Path "C:\onnxruntime-win-x64-1.17.0" -NewName "onnxruntime" -Force
          }
          Remove-Item -Path $output -Force
        } else {
          Write-Host "ONNX Runtime already cached, skipping download"
        }

    - name: Verify dependencies
      run: |
        Write-Host "=== OpenCV ==="
        Get-ChildItem -Path "C:\opencv\build\x64\vc16\bin\" -Filter "*.dll" | Select-Object Name
        Write-Host "`n=== ONNX Runtime ==="
        Get-ChildItem -Path "C:\onnxruntime\lib\" -Filter "*.dll" | Select-Object Name

    - name: Configure CMake
      shell: cmd
      run: mkdir build && cd build && cmake -G "Visual Studio 17 2022" -A x64 -DOpenCV_DIR=C:\opencv\build\x64\vc16\lib -DONNXRuntime_DIR=C:\onnxruntime\lib\cmake\onnxruntime -DCMAKE_INCLUDE_PATH=C:\onnxruntime\include ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Copy dependencies
      run: |
        Copy-Item "C:\opencv\build\x64\vc16\bin\opencv_world490.dll" dist\bin\
        Copy-Item "C:\onnxruntime\lib\onnxruntime.dll" dist\bin\

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}