name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          vcpkg/downloads
          vcpkg/installed
          vcpkg/packages
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: Install vcpkg
      run: |
        if (-not (Test-Path -Path "vcpkg\vcpkg.exe")) {
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
        }

    - name: Install OpenCV and ONNX Runtime
      run: .\vcpkg\vcpkg install opencv4:x64-windows onnxruntime:x64-windows

    - name: Configure CMake with vcpkg
      shell: cmd
      run: mkdir build && cd build && cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=..\vcpkg\scripts\buildsystems\vcpkg.cmake ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Copy vcpkg dependencies
      run: |
        Copy-Item "vcpkg\installed\x64-windows\bin\opencv_world490.dll" dist\bin\
        Copy-Item "vcpkg\installed\x64-windows\bin\onnxruntime.dll" dist\bin\

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}