name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download OpenCV
      uses: wei/wget@v1
      with:
        args: -O opencv.exe https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-windows.exe

    - name: Install OpenCV
      run: Start-Process -FilePath "opencv.exe" -ArgumentList "-oC:\opencv -y" -Wait

    - name: Download ONNX Runtime
      uses: wei/wget@v1
      with:
        args: -O onnxruntime.zip https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip

    - name: Extract ONNX Runtime
      run: Expand-Archive -Path "onnxruntime.zip" -DestinationPath "C:\" -Force

    - name: Configure CMake
      shell: cmd
      run: mkdir build && cd build && cmake -G "Visual Studio 17 2022" -A x64 -DOpenCV_DIR=C:\opencv\build\x64\vc16\lib -DONNXRuntime_DIR=C:\onnxruntime-win-x64-1.17.0\lib\cmake\onnxruntime ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy C:\opencv\build\x64\vc16\bin\opencv_world490.dll dist\bin\ && copy C:\onnxruntime-win-x64-1.17.0\lib\onnxruntime.dll dist\bin\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}