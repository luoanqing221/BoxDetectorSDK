name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Chocolatey
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

    - name: Install CMake
      run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

    - name: Install OpenCV
      run: choco install opencv -y

    - name: Download ONNX Runtime
      run: |
        Write-Host "Downloading ONNX Runtime..."
        Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip" -OutFile "onnxruntime.zip" -UseBasicParsing
        Expand-Archive -Path "onnxruntime.zip" -DestinationPath "C:\onnxruntime" -Force

    - name: Find OpenCV Path
      run: |
        Write-Host "OpenCV installed locations:"
        Get-ChildItem -Path "C:\tools" -Recurse -Filter "OpenCVConfig.cmake" | Select-Object FullName

    - name: List ONNX Files
      run: |
        Write-Host "ONNX Runtime files:"
        Get-ChildItem -Path "C:\onnxruntime" -Recurse | Select-Object FullName

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        $env:OpenCV_DIR = "C:\tools\opencv\build\x64\vc16\lib"
        $env:ONNXRuntime_DIR = "C:\onnxruntime\lib\cmake\onnxruntime"
        Write-Host "OpenCV_DIR: $env:OpenCV_DIR"
        Write-Host "ONNXRuntime_DIR: $env:ONNXRuntime_DIR"
        cmake -G "Visual Studio 17 2022" -A x64 ..

    - name: Build
      run: |
        cd build
        cmake --build . --config Release

    - name: Prepare Distribution
      run: |
        mkdir -p dist/bin
        mkdir -p dist/lib
        mkdir -p dist/include
        
        Copy-Item "build\Release\BoxDetectorSDK.dll" dist/bin/
        Copy-Item "build\Release\BoxDetectorSDK.lib" dist/lib/
        Copy-Item "BoxDetectorSDK.h" dist/include/
        Copy-Item "C:\tools\opencv\build\x64\vc16\bin\opencv_world490.dll" dist/bin/
        Copy-Item "C:\onnxruntime\lib\onnxruntime.dll" dist/bin/
        Copy-Item "BoxDetectorSDK.cs" dist/
        Copy-Item "README.md" dist/

    - name: Create Archive
      run: |
        cd dist
        Compress-Archive -Path * -DestinationPath ../BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}