name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          C:\opencv
          C:\onnxruntime
        key: dependencies-${{ runner.os }}-opencv490-onnx1170
        restore-keys: |
          dependencies-${{ runner.os }}-

    - name: Download OpenCV prebuilt from Huawei Mirror
      if: !exists('C:/opencv/build/x64/vc16/bin/opencv_world490.dll')
      run: |
        try {
          Invoke-WebRequest -Uri "https://mirrors.huaweicloud.com/opencv/4.9.0/opencv-4.9.0-windows.exe" -OutFile "opencv.exe" -UseBasicParsing
        } catch {
          Write-Host "Huawei mirror failed, trying official source..."
          Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-windows.exe" -OutFile "opencv.exe" -UseBasicParsing
        }
        Start-Process -FilePath "opencv.exe" -ArgumentList "-oC:\opencv -y" -Wait

    - name: Download ONNX Runtime prebuilt
      if: !exists('C:/onnxruntime/lib/onnxruntime.dll')
      run: |
        Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip" -OutFile "onnxruntime.zip" -UseBasicParsing
        Expand-Archive -Path "onnxruntime.zip" -DestinationPath "C:\" -Force
        if (Test-Path "C:\onnxruntime-win-x64-1.17.0") {
          Rename-Item -Path "C:\onnxruntime-win-x64-1.17.0" -NewName "onnxruntime" -Force
        }

    - name: List ONNX Runtime files
      run: Get-ChildItem -Path "C:\onnxruntime" -Recurse -Filter "*.h" | Select-Object FullName | Select-Object -First 20

    - name: Configure CMake
      shell: cmd
      run: mkdir build && cd build && cmake -G "Visual Studio 17 2022" -A x64 -DOpenCV_DIR=C:\opencv\build\x64\vc16\lib -DONNXRuntime_DIR=C:\onnxruntime\lib\cmake\onnxruntime -DCMAKE_INCLUDE_PATH=C:\onnxruntime\include ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Copy dependencies
      run: |
        Copy-Item "C:\opencv\build\x64\vc16\bin\opencv_world490.dll" dist\bin\
        Copy-Item "C:\onnxruntime\lib\onnxruntime.dll" dist\bin\

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}