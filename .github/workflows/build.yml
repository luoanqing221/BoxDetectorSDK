name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create directories
      run: |
        New-Item -ItemType Directory -Path "C:\deps" -Force | Out-Null
        New-Item -ItemType Directory -Path "C:\deps\opencv" -Force | Out-Null
        New-Item -ItemType Directory -Path "C:\deps\onnxruntime" -Force | Out-Null

    - name: Download OpenCV
      run: |
        Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-windows.exe" -OutFile "C:\deps\opencv.exe" -UseBasicParsing
        Start-Process -FilePath "C:\deps\opencv.exe" -ArgumentList "-oC:\deps\opencv -y" -Wait -NoNewWindow

    - name: Download ONNX Runtime
      run: |
        Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip" -OutFile "C:\deps\onnxruntime.zip" -UseBasicParsing
        Expand-Archive -Path "C:\deps\onnxruntime.zip" -DestinationPath "C:\deps\onnxruntime" -Force

    - name: List files for debugging
      run: |
        Write-Host "=== OpenCV files ==="
        Get-ChildItem -Path "C:\deps\opencv" -Recurse -Filter "*.cmake" | Select-Object FullName | Select-Object -First 10
        Write-Host "`n=== ONNX Runtime files ==="
        Get-ChildItem -Path "C:\deps\onnxruntime" -Recurse -Filter "*.cmake" | Select-Object FullName | Select-Object -First 10

    - name: Configure CMake
      shell: cmd
      run: |
        set OPENCV_DIR=C:\deps\opencv\build\x64\vc16\lib
        set ONNXRUNTIME_DIR=C:\deps\onnxruntime\onnxruntime-win-x64-1.17.0\lib\cmake\onnxruntime
        mkdir build && cd build
        cmake -G "Visual Studio 17 2022" -A x64 -DOpenCV_DIR=%OPENCV_DIR% -DONNXRuntime_DIR=%ONNXRUNTIME_DIR% ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Copy dependencies
      run: |
        Copy-Item "C:\deps\opencv\build\x64\vc16\bin\opencv_world490.dll" dist\bin\
        Copy-Item "C:\deps\onnxruntime\onnxruntime-win-x64-1.17.0\lib\onnxruntime.dll" dist\bin\

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}