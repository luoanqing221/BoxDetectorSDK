name: Build Windows DLL

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create directories
      run: |
        New-Item -ItemType Directory -Path "C:\deps" -Force | Out-Null

    - name: Download and extract OpenCV
      run: |
        Write-Host "Downloading OpenCV..."
        Invoke-WebRequest -Uri "https://github.com/opencv/opencv/releases/download/4.9.0/opencv-4.9.0-windows.exe" -OutFile "C:\deps\opencv.exe" -UseBasicParsing
        Write-Host "Installing OpenCV..."
        Start-Process -FilePath "C:\deps\opencv.exe" -ArgumentList "-oC:\deps\opencv -y" -Wait -NoNewWindow
        
        Write-Host "OpenCV installed, listing files..."
        Get-ChildItem -Path "C:\deps\opencv" -Recurse | Select-Object FullName | Select-Object -First 30

    - name: Find OpenCV config file
      id: find_opencv
      run: |
        $configFiles = Get-ChildItem -Path "C:\deps\opencv" -Recurse -Filter "OpenCVConfig.cmake"
        if ($configFiles) {
          $path = Split-Path -Path $configFiles[0].FullName -Parent
          Write-Host "Found OpenCV config at: $path"
          Write-Output "::set-output name=opencv_dir::$path"
        } else {
          Write-Host "OpenCV config not found!"
          exit 1
        }

    - name: Download and extract ONNX Runtime
      run: |
        Write-Host "Downloading ONNX Runtime..."
        Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v1.17.0/onnxruntime-win-x64-1.17.0.zip" -OutFile "C:\deps\onnxruntime.zip" -UseBasicParsing
        Write-Host "Extracting ONNX Runtime..."
        Expand-Archive -Path "C:\deps\onnxruntime.zip" -DestinationPath "C:\deps" -Force
        
        Write-Host "ONNX Runtime extracted, listing files..."
        Get-ChildItem -Path "C:\deps" -Recurse -Filter "*onnxruntime*" | Select-Object FullName | Select-Object -First 20

    - name: Find ONNX Runtime config file
      id: find_onnx
      run: |
        $configFiles = Get-ChildItem -Path "C:\deps" -Recurse -Filter "onnxruntimeConfig.cmake"
        if ($configFiles) {
          $path = Split-Path -Path $configFiles[0].FullName -Parent
          Write-Host "Found ONNX Runtime config at: $path"
          Write-Output "::set-output name=onnx_dir::$path"
        } else {
          Write-Host "ONNX Runtime config not found!"
          exit 1
        }

    - name: Configure CMake
      shell: cmd
      run: |
        echo Using OpenCV dir: ${{ steps.find_opencv.outputs.opencv_dir }}
        echo Using ONNX dir: ${{ steps.find_onnx.outputs.onnx_dir }}
        mkdir build && cd build
        cmake -G "Visual Studio 17 2022" -A x64 -DOpenCV_DIR=${{ steps.find_opencv.outputs.opencv_dir }} -DONNXRuntime_DIR=${{ steps.find_onnx.outputs.onnx_dir }} ..

    - name: Build
      shell: cmd
      run: cd build && cmake --build . --config Release

    - name: Prepare Distribution
      shell: cmd
      run: mkdir dist\bin && mkdir dist\lib && mkdir dist\include && copy build\Release\BoxDetectorSDK.dll dist\bin\ && copy build\Release\BoxDetectorSDK.lib dist\lib\ && copy BoxDetectorSDK.h dist\include\ && copy BoxDetectorSDK.cs dist\ && copy README.md dist\

    - name: Copy dependencies
      run: |
        Get-ChildItem -Path "C:\deps\opencv" -Recurse -Filter "opencv_world490.dll" | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName -Destination "dist\bin\" }
        Get-ChildItem -Path "C:\deps" -Recurse -Filter "onnxruntime.dll" | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName -Destination "dist\bin\" }

    - name: Create Archive
      run: Compress-Archive -Path dist\* -DestinationPath BoxDetectorSDK-Windows-x64.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BoxDetectorSDK-Windows-x64
        path: BoxDetectorSDK-Windows-x64.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: BoxDetectorSDK-Windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}